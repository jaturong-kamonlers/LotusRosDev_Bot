; PlatformIO Project Configuration File
;
; ═══════════════════════════════════════════════════════════════
;  เลือก Transport: แก้ 2 บรรทัด แล้ว pio run --target upload
; ═══════════════════════════════════════════════════════════════
;
;  WiFi UDP (ค่าเริ่มต้น):
;    board_microros_transport = wifi
;    build_flags: ใส่ -D USE_WIFI_TRANSPORT
;
;  USB Serial:
;    board_microros_transport = serial
;    build_flags: ลบ -D USE_WIFI_TRANSPORT ออก
;
; ═══════════════════════════════════════════════════════════════

[env]
platform = teensy
framework = arduino
upload_port = /dev/ttyACM0
upload_protocol = teensy-cli
board_microros_transport = serial
board_microros_distro = ${sysenv.ROS_DISTRO}
lib_deps = https://github.com/micro-ROS/micro_ros_platformio
    jrowberg/I2Cdevlib-Core
    jrowberg/I2Cdevlib-ADXL345
    jrowberg/I2Cdevlib-AK8975
    jrowberg/I2Cdevlib-HMC5843
    jrowberg/I2Cdevlib-HMC5883L
    jrowberg/I2Cdevlib-ITG3200
    https://github.com/wollewald/INA219_WE
    https://github.com/arcao/Syslog
build_flags = -I ../config

[env:myrobot]
platform = espressif32
board = esp32dev
framework = arduino
board_build.mcu = esp32
board_build.f_cpu = 240000000L
upload_port = /dev/ttyUSB0
upload_protocol = esptool
board_microros_distro = humble

; ═══════════════════════════════════════════════════════════════
;  เลือก Transport ด้านล่างนี้
; ═══════════════════════════════════════════════════════════════
; board_microros_transport = wifi   ; WiFi UDP → เปลี่ยนเป็น serial สำหรับ USB
board_microros_transport = serial

monitor_port = /dev/ttyUSB0
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
lib_deps =
    ${env.lib_deps}
    madhephaestus/ESP32Servo@^0.13.0
    madhephaestus/ESP32Encoder @ ^0.10.1
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.1
build_flags =
    -I ../config
    -D USE_MYROBOT_CONFIG
;     -D USE_WIFI_TRANSPORT   ; WiFi → ลบบรรทัดนี้ออกสำหรับ USB Serial
